version: '3.8'

services:
  admin-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev.admin-api
    container_name: admin-api
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - TZ=Asia/Seoul

      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}

      - SPRING_DATASOURCE_URL=jdbc:mysql://${DATA_NODE_IP}:3307/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
      - SPRING_DATA_REDIS_HOST=${DATA_NODE_IP}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${DATA_NODE_IP}:9094
      - SPRING_ELASTICSEARCH_URIS=http://${DATA_NODE_IP}:9200
    ports:
      - "${ADMIN_API_PORT}:8080"
    restart: on-failure