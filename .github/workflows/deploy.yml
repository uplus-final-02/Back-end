name: Deploy to EC2

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Gradle 캐시 설정 (빌드 속도 향상)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 애플리케이션 빌드
        run: |
          chmod +x gradlew
          ./gradlew :modules:user-api:bootJar :modules:admin-api:bootJar -x test

      - name: EC2로 파일 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "modules/user-api/build/libs/*.jar,modules/admin-api/build/libs/*.jar,docker-compose.dev.yml,docker/"
          target: "~/Back-end"
          overwrite: true

      - name: EC2 배포 실행 (환경 변수 주입)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Back-end

            export MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}"
            export MYSQL_DATABASE="${{ secrets.MYSQL_DATABASE }}"
            export MYSQL_USER="${{ secrets.MYSQL_USER }}"
            export MYSQL_PASSWORD="${{ secrets.MYSQL_PASSWORD }}"
            export MINIO_ROOT_USER="${{ secrets.MINIO_ROOT_USER }}"
            export MINIO_ROOT_PASSWORD="${{ secrets.MINIO_ROOT_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export ELASTIC_PASSWORD="${{ secrets.ELASTIC_PASSWORD }}"
            
            export MINIO_ENDPOINT="http://${{ secrets.EC2_HOST }}:${{ secrets.MINIO_PORT }}"
            
            export MYSQL_PORT="${{ secrets.MYSQL_PORT }}"
            export REDIS_PORT="${{ secrets.REDIS_PORT }}"
            export KAFKA_PORT="${{ secrets.KAFKA_PORT }}"
            export ES_PORT="${{ secrets.ES_PORT }}"
            export MINIO_PORT="${{ secrets.MINIO_PORT }}"
            export MINIO_CONSOLE_PORT="${{ secrets.MINIO_CONSOLE_PORT }}"
            export USER_API_PORT="${{ secrets.USER_API_PORT }}"
            export ADMIN_API_PORT="${{ secrets.ADMIN_API_PORT }}"
            export ES_SECURITY_ENABLED="${{ secrets.ES_SECURITY_ENABLED }}"
            export ES_HEAP="${{ secrets.ES_HEAP }}"
            
            docker compose -f docker-compose.dev.yml up -d --build
            docker image prune -f