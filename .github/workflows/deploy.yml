name: Deploy to EC2

on:
  push:
    branches: [ develop ]  # develop 브랜치에 push될 때 자동 실행

jobs:
  # ── STEP 1: 빌드 & 테스트 ──────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 캐시 설정 (빌드 속도 향상)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드 (테스트 제외)
        run: ./gradlew :modules:user-api:bootJar :modules:admin-api:bootJar -x test

  # ── STEP 2: EC2 배포 ───────────────────────────────────
  deploy:
    needs: build  # build 성공 후에만 실행
    runs-on: ubuntu-latest

    steps:
      - name: EC2에 SSH 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Back-end

            # 최신 코드 받기
            git pull origin develop

            # 재빌드 & 재시작 (변경된 서비스만 재시작됨)
            docker compose up -d --build

            # 오래된 이미지 정리
            docker image prune -f
