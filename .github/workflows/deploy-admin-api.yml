name: Deploy Admin API

on:
  push:
    branches: [ develop, 'feat/#218-cdn' ]
    paths:
      - 'modules/admin-api/**'
      - 'modules/core/**'
      - 'modules/domain/**'
      - 'docker-compose.admin-api.yml'
      - 'docker/Dockerfile.dev.admin-api'
      - '.github/workflows/deploy-admin-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Admin API 빌드
        run: |
          chmod +x gradlew
          ./gradlew :modules:admin-api:bootJar -x test

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: S3에 파일 업로드
        run: |
          aws s3 cp modules/admin-api/build/libs/*.jar s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/admin-api/admin-api.jar
          aws s3 cp docker-compose.admin-api.yml s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/admin-api/
          aws s3 cp docker/Dockerfile.dev.admin-api s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/admin-api/docker/Dockerfile.dev.admin-api

      - name: EC2 동시 배포 실행 (SSM)
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.ADMIN_API_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'mkdir -p /home/ubuntu/utopia-admin-api/modules/admin-api/build/libs',
              'mkdir -p /home/ubuntu/utopia-admin-api/docker',
              'cd /home/ubuntu/utopia-admin-api',
          
              'aws s3 cp s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/admin-api/admin-api.jar modules/admin-api/build/libs/',
              'aws s3 cp s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/admin-api/docker-compose.admin-api.yml .',
              'aws s3 cp s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/admin-api/docker/Dockerfile.dev.admin-api docker/',
          
              'echo \"${{ secrets.ENV_FILE }}\" > .env',
          
              'sudo docker compose -f docker-compose.admin-api.yml up -d --build',
              'sudo docker image prune -f'
            ]"