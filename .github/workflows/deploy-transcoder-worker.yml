name: Deploy Transcoder Worker

on:
  push:
    branches: [ develop, 'deploy/#168-v2' ]
    paths:
      - 'modules/transcoder-worker/**'
      - 'modules/core/**'
      - 'docker-compose.transcoder-worker.yml'
      - 'docker/Dockerfile.dev.transcoder-worker'
      - '.github/workflows/deploy-transcoder-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Gradle 캐시 설정
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Transcoder Worker 빌드
        run: |
          chmod +x gradlew
          ./gradlew :modules:transcoder-worker:bootJar -x test

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: S3에 파일 업로드
        run: |
          aws s3 cp modules/transcoder-worker/build/libs/*.jar s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/transcoder-worker/transcoder-worker.jar
          aws s3 cp docker-compose.transcoder-worker.yml s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/transcoder-worker/
          aws s3 cp docker/Dockerfile.transcoder-worker s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/transcoder-worker/docker/Dockerfile.dev.transcoder-worker

      - name: EC2 배포 실행 (SSM)
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.TRANSCODER_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'mkdir -p /home/ubuntu/utopia-transcoder/modules/transcoder-worker/build/libs',
              'mkdir -p /home/ubuntu/utopia-transcoder/docker',
              'cd /home/ubuntu/utopia-transcoder',
          
              'aws s3 cp s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/transcoder-worker/transcoder-worker.jar modules/transcoder-worker/build/libs/',
              'aws s3 cp s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/transcoder-worker/docker-compose.transcoder-worker.yml .',
              'aws s3 cp s3://${{ secrets.S3_DEPLOY_BUCKET }}/deploy/transcoder-worker/docker/Dockerfile.dev.transcoder-worker docker/',
          
              'echo \"${{ secrets.ENV_FILE }}\" > .env',
          
              'sudo docker compose -f docker-compose.transcorder-worker.yml up -d --build',
              'sudo docker image prune -f'
            ]"