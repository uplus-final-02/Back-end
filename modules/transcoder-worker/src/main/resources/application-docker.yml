spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:transcoder-worker}
      auto-offset-reset: earliest
      max-poll-records: 1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        max.poll.interval.ms: 7200000

app:
  kafka:
    topics:
      video-transcode: ${VIDEO_TRANSCODE_TOPIC}
      video-transcode-result: ${VIDEO_TRANSCODE_RESULT_TOPIC}
  transcode:
    max-concurrent-ffmpeg: ${TRANSCODE_MAX_CONCURRENT_FFMPEG:2}

  storage:
    s3:
      provider: ${S3_PROVIDER:minio}
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      public-base-url: ${S3_PUBLIC_BASE_URL:http://host.docker.internal:9000}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin123}
      bucket: ${S3_BUCKET:app-bucket}