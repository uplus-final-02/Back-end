spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  elasticsearch:
    uris: http://elasticsearch:9200
    username: ${ES_USERNAME:elastic}
    password: ${ELASTIC_PASSWORD:}

app:
  storage:
    s3:
      provider: ${S3_PROVIDER:minio}
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      public-base-url: ${S3_PUBLIC_BASE_URL:http://host.docker.internal:9000}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin123}
      bucket: ${S3_BUCKET:app-bucket}

  kafka:
    topics:
      video-transcode-admin: ${VIDEO_TRANSCODE_ADMIN_TOPIC:video.transcode.admin.requested}
      video-transcode-user: ${VIDEO_TRANSCODE_USER_TOPIC:video.transcode.user.requested}