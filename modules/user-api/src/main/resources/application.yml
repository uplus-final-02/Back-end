spring:
  application:
    name: user-api

  profiles:
    active: docker

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-version: 1              # 기본 버전 숫자: 1
    baseline-description: "Monghyang Initial DB Schema(by flyway)"
    out-of-order: true # 순차 처리 비활성화(버전 상관없이 적용되지 않은 파일 적용 시도)
    baseline-on-migrate: false  # DB 스키마가 존재하지 않는다면 V1부터 적용

  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: userapi-scheduler-

server:
  port: 8080

# JWT / OAuth / S3 등은 환경변수로 받는 형태로 두는 것을 권장합니다.
app:
  jwt:
    secret: ${JWT_SECRET:e/z5VcoVp2f4CVe/DQYKeY0khCf4ts0IbduYdeCGejI=}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:1800}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}

  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}

  storage:
    s3:
      provider: ${S3_PROVIDER:minio} # minio | aws
      bucket: ${S3_BUCKET:app-bucket}
      region: ${AWS_REGION:ap-northeast-2}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      endpoint: ${S3_ENDPOINT:}  # MinIO면 넣고, AWS면 비워도 됨

  search:
    initial-index-on-startup: ${SEARCH_INITIAL_INDEX_ON_STARTUP:false}
    realtime-sync:
      enabled: ${SEARCH_REALTIME_SYNC_ENABLED:true}
      interval-ms: ${SEARCH_REALTIME_SYNC_INTERVAL_MS:30000}
