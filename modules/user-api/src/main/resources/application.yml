spring:
  application:
    name: user-api

  profiles:
    active: docker

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-version: 1              # 기본 버전 숫자: 1
    baseline-description: "Monghyang Initial DB Schema(by flyway)"
    out-of-order: true # 순차 처리 비활성화(버전 상관없이 적용되지 않은 파일 적용 시도)
    baseline-on-migrate: false  # DB 스키마가 존재하지 않는다면 V1부터 적용

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000  # 연결 수립 최대 대기 (ms)
          timeout: 5000            # 소켓 읽기 최대 대기 (ms)
          writetimeout: 5000       # 소켓 쓰기 최대 대기 (ms)
        debug: false

  task:
    scheduling:
      pool:
        size: 5
      thread-name-prefix: userapi-scheduler-
      
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

# JWT / OAuth / S3 등은 환경변수로 받는 형태로 두는 것을 권장합니다.
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:1800}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}
    setup-token-ttl-seconds: ${JWT_SETUP_TTL:600}    # 10분 (회원가입 세션)

  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: ${GOOGLE_REDIRECT_URI}
    kakao:
      client-id: ${KAKAO_CLIENT_ID}
      client-secret: ${KAKAO_CLIENT_SECRET}
      redirect-uri: ${KAKAO_REDIRECT_URI}
    naver:
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      redirect-uri: ${NAVER_REDIRECT_URI}

  storage:
    s3:
      provider: ${S3_PROVIDER:minio} # minio | aws
      bucket: ${S3_BUCKET:app-bucket}
      region: ${S3_REGION:ap-northeast-2}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      endpoint: ${S3_ENDPOINT:}  # MinIO면 넣고, AWS면 비워도 됨
      public-base-url: ${S3_PUBLIC_BASE_URL}

    local-cdn:
      # HLS URL 서명용 비밀키 (환경변수 HLS_SIGNING_SECRET로 주입 권장)
      secret-key: ${HLS_SIGNING_SECRET:default-secret-key-change-me-in-prod}

    # CloudFrontProperties 빈 생성 에러 방지용 더미 설정 (로컬 테스트 시 사용 안 함)
    cloudfront:
      domain-name: ""
      key-pair-id: ""
      private-key-path: ""
      use-local: false
      sign-secret: ""

  search:
    initial-index-on-startup: ${SEARCH_INITIAL_INDEX_ON_STARTUP:false}
    realtime-sync:
      enabled: ${SEARCH_REALTIME_SYNC_ENABLED:true}
      interval-ms: ${SEARCH_REALTIME_SYNC_INTERVAL_MS:30000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}