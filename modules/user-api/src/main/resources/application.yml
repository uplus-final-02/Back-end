spring:
  application:
    name: user-api

  profiles:
    active: local

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

# JWT / OAuth / S3 등은 환경변수로 받는 형태로 두는 것을 권장합니다.
app:
  jwt:
    secret: ${JWT_SECRET:change-me}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL:1800}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:1209600}

  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_REDIRECT_URI:}

  storage:
    s3:
      provider: ${S3_PROVIDER:minio} # minio | aws
      bucket: ${S3_BUCKET:app-bucket}
      region: ${AWS_REGION:ap-northeast-2}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      endpoint: ${S3_ENDPOINT:}  # MinIO면 넣고, AWS면 비워도 됨