spring:
  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 3000      # 기본 30s → 3s: 순간 장애 시 빠른 실패로 스레드 누적 방지
      keepalive-time: 30000         # 30s마다 keepalive 쿼리: 끊긴 커넥션 조기 감지·교체
      max-lifetime: 1800000         # 30분 (HikariCP 기본값 유지)

  data:
    redis:
      host: redis
      port: 6379

  kafka:
    bootstrap-servers: kafka:9092

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

  elasticsearch:
    uris: http://elasticsearch:9200
    username: ${ES_USERNAME:elastic}
    password: ${ELASTIC_PASSWORD:}

app:
  search:
    initial-index-on-startup: ${SEARCH_INITIAL_INDEX_ON_STARTUP:true}
    realtime-sync:
      enabled: ${SEARCH_REALTIME_SYNC_ENABLED:true}
      interval-ms: ${SEARCH_REALTIME_SYNC_INTERVAL_MS:30000}

  storage:
    s3:
      provider: ${S3_PROVIDER:minio}
      endpoint: ${S3_ENDPOINT:http://minio:9000}
      public-base-url: ${S3_PUBLIC_BASE_URL:http://host.docker.internal:9000}
      access-key: ${S3_ACCESS_KEY:minioadmin}
      secret-key: ${S3_SECRET_KEY:minioadmin123}
      bucket: ${S3_BUCKET:app-bucket}
